<div class="container mt-4">
  <h2 class="mb-3">Lista de Tareas</h2>

  <ul class="list-group">
    @for (tarea of res(); track tarea.id) {
      <li class="list-group-item d-flex justify-content-between align-items-center">

        <span [class.text-decoration-line-through]="tarea.completada">
          #{{tarea.id}} — {{tarea.titulo}}
        </span>

        <button class="btn btn-sm"
                [class.btn-success]="!tarea.completada"
                [class.btn-danger]="tarea.completada"
                (click)="cambiarCompletado(tarea.id)">
          {{ tarea.completada ? 'Deshacer' : 'Completar' }}
        </button>

      </li>
    }
  </ul>
</div>
